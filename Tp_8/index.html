<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vue.js Components</title>

<style>
.notActiveBtn{
background-color: gray;
cursor: not-allowed;
}

img{
width:200px;
}
</style>

</head>
<body>

<div id="app">

<!-- Cart Section -->
<div class="cart">
<h2>Cart</h2>

<table border="1">
<tr>
<td>Formation</td>
<td>{{ title }} - {{ version }}</td>
</tr>

<tr>
<td>Number of Licences</td>
<td>{{ nbrLicence }}</td>
</tr>

<tr>
<td>Total Price</td>
<td>{{ totalePrice }}</td>
</tr>
</table>

</div>

<hr>

<!-- Cours Section -->
<div class="cours-section">

<cours
:islastversion="isLastVersionCours"
@add-course="doSum">
</cours>

</div>

</div>


<!-- Vue.js CDN -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>

const app = Vue.createApp({

data(){
return{

title : "Vue.js",
version : 3,
totalePrice : 0,
nbrLicence : 0,
priceLicence : 100,
isLastVersionCours : true

}
},

methods:{

doSum(){

this.nbrLicence++
this.totalePrice += this.priceLicence

}

}

})

</script>

<!-- Component -->
<script src="components/Cours.js"></script>

<script>
app.mount('#app')
</script>

</body>
</html>
